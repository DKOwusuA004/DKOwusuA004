<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine?</title>
    <link rel="stylesheet" type="text/css" href="index.css">
</head>
<body>
    <div class="heart-background"></div>
    <div class="page-content">
    <div class="panda-wrapper">
        <div class="speech-bubble">please say yes!</div>
        <div class="panda">
            <div class="panda-ear left"></div>
            <div class="panda-ear right"></div>
            <div class="panda-face">
                <div class="panda-eye left"></div>
                <div class="panda-eye-patch left"></div>
                <div class="panda-eye right"></div>
                <div class="panda-eye-patch right"></div>
                <div class="panda-nose"></div>
                <div class="panda-mouth"></div>
                <div class="panda-blush left"></div>
                <div class="panda-blush right"></div>
            </div>
            <div class="panda-body">
                <div class="panda-arm left"></div>
                <div class="panda-arm right"></div>
                <div class="panda-leg left"></div>
                <div class="panda-leg right"></div>
            </div>
        </div>
    </div>
    <div class="login-form">
    <h2>Will you be my girlfriend?</h2>

<div class="checkbox-container">

    <label class="checkbox-option">
        <span>Yes</span>
        <input type="checkbox" id="password">
    </label>

    <label class="checkbox-option">
        <span>No</span>
        <input class="checkmark" type="checkbox" id="password2">
    </label>

</div>

    <button onclick="checkPassword()">Confirm</button>
</div>
    </div>

    <script src="index.js"></script>
</body>
</html>
